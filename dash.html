<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>YES BOSS — Admin Dashboard</title>
  <style>
    :root{--bg:#f7f5f6;--surface:#fff;--ink:#29252a;--muted:#756e76;--line:#e8e1e5;--rose:#b85c7e;--rose-soft:#fbf0f4;--green:#167b54;--green-bg:#e9f7f0;--amber:#b76e00;--amber-bg:#fff5df;--red:#bd3545;--red-bg:#fcebed;--radius:14px;--shadow:0 8px 24px rgba(42,31,37,.06)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Sukhumvit Set","Noto Sans Thai",sans-serif} button{font:inherit} .shell{max-width:1440px;margin:auto;padding:20px 24px 64px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:1px solid var(--line);padding:6px 0 18px}.brand{display:flex;align-items:center;gap:11px}.mark{height:36px;width:36px;border-radius:11px;background:var(--rose);color:#fff;display:grid;place-items:center;font-size:18px;font-weight:800}.eyebrow{color:var(--rose);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}.top h1{font-size:22px;line-height:1.15;margin:2px 0}.updated{color:var(--muted);font-size:13px;margin-top:4px}.actions{display:flex;gap:8px;align-items:center}.range-filter{display:flex;gap:9px;align-items:center;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid var(--line);font-size:13px}.range-filter label{display:flex;align-items:center;gap:5px;color:var(--muted);font-weight:700}.range-filter input{border:1px solid var(--line);border-radius:8px;padding:7px;background:#fff;color:var(--ink)}.range-filter small{color:var(--red);font-weight:700}.btn{border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:9px 12px;font-weight:700;color:var(--ink);cursor:pointer}.btn:hover{border-color:var(--rose);color:var(--rose)}.btn.primary{background:var(--rose);color:white;border-color:var(--rose)}.tabs{display:flex;gap:4px;overflow-x:auto;padding:16px 0 10px;position:sticky;top:0;background:var(--bg);z-index:4}.tab{white-space:nowrap;border:0;background:transparent;padding:8px 10px;border-radius:8px;color:var(--muted);font-weight:700;cursor:pointer}.tab.active{background:var(--rose-soft);color:var(--rose)}.panel{display:none}.panel.active{display:block}.section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:24px 0 10px}.section-head h2{font-size:18px;margin:0}.section-head p{color:var(--muted);font-size:13px;margin:0}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metrics.six{grid-template-columns:repeat(6,minmax(0,1fr))}.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow)}.metric-label{color:var(--muted);font-weight:650;font-size:13px}.metric-value{font-size:27px;line-height:1.15;font-weight:800;margin-top:6px;letter-spacing:-.035em}.metric-note{font-size:12px;color:var(--muted);margin-top:5px}.split{display:grid;grid-template-columns:1.25fr .75fr;gap:12px;margin-top:12px}.triple{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}.list{margin:0;padding:0;list-style:none}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.row small{color:var(--muted)}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800}.pill.ok{color:var(--green);background:var(--green-bg)}.pill.warn{color:var(--amber);background:var(--amber-bg)}.pill.danger{color:var(--red);background:var(--red-bg)}.pill.neutral{color:var(--muted);background:#f1edef}.health{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.health-item{border:1px solid var(--line);border-radius:11px;padding:12px}.health-item b{display:block;margin-top:7px;font-size:15px}.bars{height:177px;display:flex;align-items:end;gap:5px;padding-top:14px}.bar-wrap{height:100%;flex:1;min-width:8px;display:flex;align-items:end;position:relative}.bar{width:100%;min-height:2px;background:var(--rose);border-radius:5px 5px 1px 1px}.bar-wrap:hover .tip{display:block}.tip{display:none;position:absolute;left:50%;bottom:100%;transform:translate(-50%,-6px);white-space:nowrap;background:#302b2f;color:#fff;border-radius:6px;font-size:11px;padding:4px 6px;z-index:2}.empty{color:var(--muted);font-size:13px;padding:14px 0}.notice{border-left:3px solid var(--amber);padding:10px 12px;background:var(--amber-bg);border-radius:0 9px 9px 0;font-size:13px;color:#6e4a0e;margin-top:12px}.user-table{width:100%;min-width:820px;border-collapse:collapse;font-size:13px}.user-table th{font-size:11px;letter-spacing:.02em;color:var(--muted);text-align:left;background:#faf8f9;white-space:nowrap}.user-table th,.user-table td{padding:10px 9px;border-bottom:1px solid var(--line);vertical-align:middle}.user-table tr:last-child td{border-bottom:0}.user-table td:not(:first-child){white-space:nowrap}.user-table tbody tr:hover{background:var(--rose-soft)}.user-btn{border:0;background:transparent;padding:0;font:inherit;font-weight:800;color:var(--rose);cursor:pointer;text-align:left;display:inline-flex;align-items:center;gap:8px}.avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#f3e9ed;display:inline-grid;place-items:center;flex:0 0 28px}.avatar.fallback{font-size:12px;color:var(--rose);font-weight:800}.drawer-user-head{display:flex;align-items:center;gap:12px}.drawer-avatar{width:52px;height:52px;flex-basis:52px;font-size:21px}.user-btn:hover{text-decoration:underline}.drawer-backdrop{position:fixed;inset:0;background:rgba(37,28,33,.35);z-index:40;display:flex;justify-content:flex-end}.drawer{width:min(520px,100%);height:100%;overflow:auto;background:var(--surface);padding:28px;box-shadow:-8px 0 30px rgba(30,20,25,.18);position:relative}.drawer h2{margin:4px 0}.drawer h3{font-size:16px;margin:22px 0 2px}.drawer-close{position:absolute;right:15px;top:13px;border:0;background:#f4eff1;color:var(--ink);border-radius:50%;width:32px;height:32px;font-size:24px;line-height:1;cursor:pointer}.drawer-note{font-size:12px;color:var(--muted);margin:0 0 12px}.detail-stats{display:flex;gap:8px;margin-top:16px;overflow:auto}.detail-stats span{white-space:nowrap;background:var(--rose-soft);border-radius:8px;padding:7px 8px;font-size:12px}.detail-stats b{display:block;font-size:16px}.chat-list{display:grid;gap:9px}.chat{max-width:88%;border-radius:12px;padding:9px 11px;font-size:14px}.chat small{display:block;font-size:10px;color:var(--muted);margin-bottom:3px}.chat.customer{background:#f2eff0;justify-self:start}.chat.bossy{background:var(--rose-soft);justify-self:end}.error{max-width:580px;margin:90px auto;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px;text-align:center;box-shadow:var(--shadow)}.error h2{margin:0 0 8px}.error p{color:var(--muted);margin:0 0 14px}.key-input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;margin:5px 0 9px}.privacy{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,255,255,.82);backdrop-filter:blur(18px);z-index:50;color:var(--rose);font-weight:800;font-size:17px}.privacy span{display:block;text-align:center}.privacy small{display:block;color:var(--muted);font-weight:600;font-size:12px;margin-top:6px}.loading{opacity:.5;pointer-events:none}@media(max-width:1000px){.metrics.six{grid-template-columns:repeat(3,1fr)}}@media(max-width:760px){.shell{padding:14px 14px 44px}.top{align-items:center}.top h1{font-size:19px}.eyebrow{font-size:10px}.metrics,.metrics.six{grid-template-columns:repeat(2,1fr)}.split,.triple{grid-template-columns:1fr}.health{grid-template-columns:repeat(2,1fr)}.metric-value{font-size:24px}.actions .btn:not(.primary){display:none}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <div id="privacy" class="privacy"><span>🔒 ปกป้องข้อมูลของบอสอยู่<small>แตะเพื่อดูต่อ</small></span></div>
  <main id="app" class="shell" aria-live="polite"></main>
  <script type="module">
    import { normalizeDashboardPayload, formatMoneyTHB, formatNumber, formatUsd, healthTone, demoDashboardPayload, dashboardRangeParams } from './admin-dashboard-data.js';
    const API = 'https://eeascfxgfmzlqvirjdua.supabase.co/functions/v1/webhook';
    const app = document.querySelector('#app');
    const privacy = document.querySelector('#privacy');
    const demoMode = new URLSearchParams(location.search).get('demo') === '1';
    let key = decodeURIComponent(location.hash.slice(1)); let data; let active = 'executive'; let selectedUser = null; const q = new URLSearchParams(location.search); let rangeStart=q.get('start')||''; let rangeEnd=q.get('end')||'';
    const esc = (v) => String(v ?? '—').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const number = (v) => formatNumber(v); const money = (v) => formatMoneyTHB(v);
    const list = (items, make, emptyText='ยังไม่มีข้อมูล') => items?.length ? `<ul class="list">${items.map(make).join('')}</ul>` : `<div class="empty">${emptyText}</div>`;
    const metric = (label, value, note='') => `<article class="card"><div class="metric-label">${label}</div><div class="metric-value">${value}</div>${note ? `<div class="metric-note">${note}</div>` : ''}</article>`;
    const bars = (items, field, unit='') => { const max = Math.max(1, ...items.map(x => Number(x[field]) || 0)); return items.length ? `<div class="bars">${items.map(x => `<div class="bar-wrap"><i class="tip">${esc(x.day)} · ${number(x[field])}${unit}</i><div class="bar" style="height:${Math.max(2,Math.round((Number(x[field])||0)/max*100))}%"></div></div>`).join('')}</div>` : '<div class="empty">ยังไม่มีข้อมูล 30 วัน</div>'; };
    const health = (label, value, tone='neutral') => `<div class="health-item"><small>${label}</small><b><span class="pill ${tone}">${value}</span></b></div>`;
    const avatar = (u, cls='avatar') => u.picture_url ? `<img class="${cls}" src="${esc(u.picture_url)}" alt="">` : `<span class="${cls} fallback">${esc(String(u.name||'?').trim().slice(0,1))}</span>`;
    const delta = (now, before) => { const a=Number(now)||0,b=Number(before)||0; if(!b)return a?'ใหม่':'—'; const p=Math.round((a-b)/b*100); return `${p>0?'▲':p<0?'▼':'—'} ${Math.abs(p)}% เทียบช่วงก่อน`; };
    function userDetail(u){if(!u)return '';const chat=u.chat_loading?'<div class="empty">กำลังโหลดแชตล่าสุด…</div>':u.chat_preview.length?u.chat_preview.map(m=>`<div class="chat ${m.role==='bossy'?'bossy':'customer'}"><small>${m.role==='bossy'?'บอสซี่':'ผู้ใช้'} · ${esc(m.at)}</small><div>${esc(m.text)}</div></div>`).join(''):'<div class="empty">ยังไม่มีแชตที่บันทึกไว้</div>';return `<div class="drawer-backdrop" id="close-user"><aside class="drawer" role="dialog" aria-modal="true" aria-label="รายละเอียดผู้ใช้" onclick="event.stopPropagation()"><button class="drawer-close" id="close-user-button" aria-label="ปิด">×</button><div class="drawer-user-head">${avatar(u,'avatar drawer-avatar')}<div><div class="eyebrow">${demoMode?'DEMO · ข้อความตัวอย่าง':'ADMIN · แชตล่าสุดจริง'}</div><h2>${esc(u.name)}</h2></div></div><p class="updated">${esc(u.plan)} · ใช้งานล่าสุด ${esc(u.last_active_at||'—')} · ${esc(u.acq_channel||'—')}</p><div class="detail-stats"><span>ข้อความ 7 วัน <b>${number(u.messages_7d)}</b></span><span>เตือนรอ <b>${number(u.reminders_open)}</b></span><span>งานค้าง <b>${number(u.tasks_open)}</b></span></div><h3>แชตล่าสุด</h3><p class="drawer-note">${demoMode?'ข้อความตัวอย่างใน Demo':'สูงสุด 50 คู่ข้อความ · ระบบบันทึก audit ทุกครั้งที่เปิดดู'}</p><div class="chat-list">${chat}</div></aside></div>`}
    async function openUser(d,i){const u=d.users[i];if(!u)return; if(demoMode||!u.user_id){selectedUser=u;render();return} selectedUser={...u,chat_loading:true,chat_preview:[]};render();try{const r=await fetch(`${API}?dash=${encodeURIComponent(key)}&chat_user=${encodeURIComponent(u.user_id)}`,{cache:'no-store',referrerPolicy:'no-referrer'});if(!r.ok)throw new Error('โหลดแชตไม่สำเร็จ');const x=await r.json();selectedUser={...u,chat_preview:Array.isArray(x.chat)?x.chat:[]}}catch(e){selectedUser={...u,chat_preview:[{role:'bossy',text:'โหลดแชตไม่สำเร็จ กรุณาลองใหม่',at:''}]}}render()}
    function tab(id,label){return `<button class="tab ${active===id?'active':''}" data-tab="${id}">${label}</button>`}
    function render(){
      const d = data; const h = d.health; const ht = healthTone(h.overall); const rangeLabel=d.range?.start&&d.range?.end?`${d.range.start} ถึง ${d.range.end}`:'30 วันล่าสุด';
      app.innerHTML = `<header class="top"><div class="brand"><div class="mark">YB</div><div><div class="eyebrow">${demoMode ? 'DEMO · ข้อมูลตัวอย่าง' : 'Private admin · aggregate only'}</div><h1>YES BOSS Dashboard</h1><div class="updated">อัปเดตล่าสุด ${esc(d.ts || '—')} · ${demoMode ? 'ไม่เชื่อมต่อ production' : 'รีเฟรชทุก 5 นาที'}</div></div></div><div class="actions"><button class="btn" id="blur">ซ่อนข้อมูล</button><button class="btn primary" id="refresh">${demoMode ? 'โหลด demo ใหม่' : 'รีเฟรช'}</button></div></header><div class="range-filter"><b>ช่วงข้อมูล</b><label>จาก <input type="date" id="range-start" value="${esc(rangeStart)}"></label><label>ถึง <input type="date" id="range-end" value="${esc(rangeEnd)}"></label><button class="btn primary" id="apply-range">ดูช่วงนี้</button><button class="btn" id="clear-range">30 วันล่าสุด</button><small id="range-error"></small></div>
        <nav class="tabs" aria-label="Dashboard navigation">${tab('executive','ผู้บริหาร')}${tab('funnel','Funnel')}${tab('overview','ภาพรวม')}${tab('growth','ผู้ใช้')}${tab('revenue','รายได้')}${tab('engagement','การใช้งาน')}${tab('operations','ระบบ')}${tab('quality','คุณภาพข้อมูล')}</nav>
        <section class="panel ${active==='executive'?'active':''}" id="executive"><div class="section-head"><div><h2>สรุปผู้บริหาร</h2><p>${esc(rangeLabel)} เทียบกับช่วงก่อนหน้าที่มีความยาวเท่ากัน</p></div></div><div class="metrics">${metric('รายได้',money(d.executive.current.revenue_thb),delta(d.executive.current.revenue_thb,d.executive.previous.revenue_thb))}${metric('ลูกค้าใหม่',number(d.executive.current.new_users),delta(d.executive.current.new_users,d.executive.previous.new_users))}${metric('ผู้ใช้ active',number(d.executive.current.active_users),delta(d.executive.current.active_users,d.executive.previous.active_users))}${metric('ผู้จ่ายเงินใหม่',number(d.executive.current.new_paid_users),delta(d.executive.current.new_paid_users,d.executive.previous.new_paid_users))}</div><div class="notice">อ่านภาพเร็ว: ดูแนวโน้มรายได้ ผู้ใช้ใหม่ Active และผู้จ่ายเงินใหม่เทียบกับช่วงก่อน ก่อนตัดสินใจเรื่องการตลาดหรือผลิตภัณฑ์</div></section>
        <section class="panel ${active==='funnel'?'active':''}" id="funnel"><div class="section-head"><div><h2>Funnel ลูกค้า</h2><p>กลุ่มที่สมัครในช่วง ${esc(rangeLabel)} และความคืบหน้าในแต่ละขั้น</p></div></div><div class="metrics">${metric('สมัคร',number(d.funnel.registered))}${metric('ยินยอม PDPA',number(d.funnel.consented),`${d.funnel.registered?Math.round(d.funnel.consented/d.funnel.registered*100):0}% ของผู้สมัคร`)}${metric('Onboard สำเร็จ',number(d.funnel.onboarded),`${d.funnel.registered?Math.round(d.funnel.onboarded/d.funnel.registered*100):0}% ของผู้สมัคร`)}${metric('ส่งข้อความแล้ว',number(d.funnel.messaged),`${d.funnel.registered?Math.round(d.funnel.messaged/d.funnel.registered*100):0}% ของผู้สมัคร`)}</div><article class="card" style="margin-top:12px"><div class="metric-label">ประสิทธิภาพตามช่องทาง</div>${list(d.funnel.by_channel,x=>`<li class="row"><span>${esc(x.channel)} <small>· onboard ${number(x.onboarded)}</small></span><b>สมัคร ${number(x.registered)} · จ่าย ${number(x.paid)}</b></li>`,'ยังไม่มีผู้สมัครในช่วงนี้')}</article></section>
        <section class="panel ${active==='overview'?'active':''}" id="overview">
          <div class="section-head"><div><h2>ภาพรวมธุรกิจ</h2><p>ตัวเลขสำคัญที่ใช้ตัดสินใจวันนี้</p></div><span class="pill ${ht}">${h.overall==='ok'?'ระบบปกติ':h.overall==='warning'?'มีจุดต้องดู':'ต้องตรวจระบบ'}</span></div>
          <div class="metrics six">${metric('ผู้ใช้ทั้งหมด',number(d.users_total),`ยินยอม PDPA ${number(d.users_consented)}`)}${metric('Active ในช่วง',number(d.active_1d),rangeLabel)}${metric('ผู้สมัครใหม่',number(d.new_7d),rangeLabel)}${metric('เงินจ่ายสำเร็จ',money(d.revenue.paid_30d_thb),rangeLabel)}${metric('ค่า AI',formatUsd(d.ai.cost_7d_usd),rangeLabel)}${metric('งานค้าง',number(d.tasks.open),`เลยกำหนด ${number(d.tasks.overdue)}`)}</div>
          <div class="split"><article class="card"><div class="metric-label">ผู้สมัครใหม่ 30 วัน</div>${bars(d.growth.daily,'users',' คน')}</article><article class="card"><div class="metric-label">สุขภาพระบบ</div><div class="health">${health('Webhook / OpenAI',h.openai==='ok'?'ปกติ':'ผิดปกติ',healthTone(h.openai))}${health('ตัวส่งเตือน',h.cron_ok_10m?'กำลังทำงาน':'ไม่พบรอบล่าสุด',h.cron_ok_10m?'ok':'danger')}${health('เตือนเลยเวลา',number(d.reminders.overdue),d.reminders.overdue?'warn':'ok')}${health('LINE quota',h.line_quota_used===null?'รอตรวจ':`${number(h.line_quota_used)}/${number(h.line_quota_cap)}`,h.line_quota_used && h.line_quota_cap && h.line_quota_used/h.line_quota_cap>.8?'warn':'ok')}</div></article></div>
          ${d.reminders.overdue || d.reminders.failed_24h ? `<div class="notice">มี reminder ที่ต้องดู: เลยเวลา ${number(d.reminders.overdue)} · ล้มเหลว 24 ชม. ${number(d.reminders.failed_24h)}</div>`:''}
        </section>
        <section class="panel ${active==='growth'?'active':''}" id="growth"><div class="section-head"><div><h2>ผู้ใช้และการเติบโต</h2><p>ดูการได้มา การเปิดใช้งาน และแผนปัจจุบัน</p></div></div><div class="metrics">${metric('สมัครใหม่วันนี้',number(d.new_1d))}${metric('สมัครใหม่ 7 วัน',number(d.new_7d))}${metric('สมัครใหม่ 30 วัน',number(d.new_30d))}${metric('Onboard สำเร็จ',number(d.users_onboarded),`จากทั้งหมด ${number(d.users_total)} คน`)}</div><div class="split"><article class="card"><div class="metric-label">ข้อความเข้า 30 วัน</div>${bars(d.growth.message_daily,'messages',' ข้อความ')}</article><article class="card"><div class="metric-label">สัดส่วนแพ็กเกจ</div>${list(d.plan_breakdown,x=>`<li class="row"><span>${esc(x.plan)}</span><b>${number(x.count)} คน</b></li>`,'ยังไม่มีข้อมูลแพ็กเกจ')}</article></div><article class="card" style="margin-top:12px"><div class="section-head" style="margin:0 0 10px"><div><h2 style="font-size:16px">รายชื่อและการใช้งานรายผู้ใช้</h2><p>แสดงสูงสุด 100 คน เรียงตามการใช้งานล่าสุด · ไม่มีข้อความ/เบอร์โทร/ไฟล์</p></div></div><div style="overflow-x:auto">${d.users.length ? `<table class="user-table"><thead><tr><th>ผู้ใช้</th><th>แพ็ก</th><th>ใช้งานล่าสุด</th><th>ข้อความ 7 วัน</th><th>เตือนรอ</th><th>งานค้าง</th><th>ไฟล์</th><th>ความจำ</th><th>ที่มา</th></tr></thead><tbody>${d.users.map((u,i)=>`<tr><td><button class="user-btn" data-user="${i}">${avatar(u)}<span>${esc(u.name)}</span></button></td><td><span class="pill ${u.plan==='pro'||u.plan==='business'?'ok':'neutral'}">${esc(u.plan)}</span></td><td>${esc(u.last_active_at || '—')}</td><td>${number(u.messages_7d)}</td><td>${number(u.reminders_open)}</td><td>${number(u.tasks_open)}</td><td>${number(u.docs_total)}</td><td>${number(u.facts_active)}</td><td>${esc(u.acq_channel || '—')}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">ยังไม่มีรายชื่อจาก API</div>'}</div></article></section>
        <section class="panel ${active==='revenue'?'active':''}" id="revenue"><div class="section-head"><div><h2>รายได้และการชำระเงิน</h2><p>ยึดจากรายการจ่ายสำเร็จ ไม่คาดเดา MRR</p></div></div><div class="metrics">${metric('เงินจ่ายสำเร็จ',money(d.revenue.paid_30d_thb),'30 วัน')}${metric('จำนวนรายการจ่าย',number(d.revenue.payment_count_30d),'30 วัน')}${metric('เงินสนับสนุน',money(d.revenue.donations_30d_thb),'30 วัน')}${metric('ผู้ใช้ Pro/แผนจ่าย',number(d.plan_breakdown.filter(x=>x.plan!=='free').reduce((a,x)=>a+Number(x.count||0),0)),'ตาม user plan')}</div><div class="split"><article class="card"><div class="metric-label">รายได้ตามแพ็กเกจ · 30 วัน</div>${list(d.revenue.paid_by_plan,x=>`<li class="row"><span>${esc(x.plan)} <small>· ${number(x.payments)} รายการ</small></span><b>${money(x.amount)}</b></li>`,'ยังไม่มีรายการชำระเงิน')}</article><article class="card"><div class="metric-label">Referral</div><div class="metrics" style="grid-template-columns:1fr 1fr;margin-top:12px">${metric('7 วัน',number(d.referrals.new_7d))}${metric('30 วัน',number(d.referrals.new_30d))}</div></article></div></section>
        <section class="panel ${active==='engagement'?'active':''}" id="engagement"><div class="section-head"><div><h2>การใช้งานและคุณค่าที่ลูกค้าได้</h2><p>ดูว่าผู้ใช้ใช้เลขาในงานใดมากที่สุด</p></div></div><div class="metrics six">${metric('ตั้งเตือน',number(d.engagement.reminders_7d),'7 วัน')}${metric('ส่งเตือนสำเร็จ',number(d.engagement.reminders_sent_7d),'7 วัน')}${metric('งานที่สร้าง',number(d.engagement.tasks_created_7d),'7 วัน')}${metric('งานเสร็จ',number(d.engagement.tasks_done_7d),'7 วัน')}${metric('รายการเงิน',number(d.engagement.expenses_7d),'7 วัน')}${metric('ไฟล์ / ความจำ',`${number(d.engagement.documents_7d)} / ${number(d.engagement.facts_7d)}`,'เพิ่มใหม่ 7 วัน')}</div><div class="split"><article class="card"><div class="metric-label">Intent ที่ถูกใช้มากสุด · 7 วัน</div>${list(d.engagement.intents,x=>`<li class="row"><span>${esc(x.intent)}</span><b>${number(x.count)}</b></li>`,'ยังไม่มี intent')}</article><article class="card"><div class="metric-label">งานที่ต้องตาม</div><ul class="list"><li class="row"><span>งานเปิดอยู่</span><b>${number(d.tasks.open)}</b></li><li class="row"><span>งานเลยกำหนด</span><b>${number(d.tasks.overdue)}</b></li><li class="row"><span>งานติดขัด</span><b>${number(d.tasks.blocked)}</b></li><li class="row"><span>Reminder รอส่ง</span><b>${number(d.reminders.pending)}</b></li></ul></article></div></section>
        <section class="panel ${active==='operations'?'active':''}" id="operations"><div class="section-head"><div><h2>การปฏิบัติการและต้นทุน AI</h2><p>ตรวจความเสถียร ก่อนกระทบลูกค้า</p></div></div><div class="metrics">${metric('AI calls',number(d.ai.calls_7d),'7 วัน')}${metric('ค่า AI วันนี้',formatUsd(d.ai.cost_today_usd))}${metric('ค่า AI 7 วัน',formatUsd(d.ai.cost_7d_usd))}${metric('สัญญาณลูกค้าติดขัด',number(d.support.frustration_signals_24h),'24 ชั่วโมง')}</div><div class="split"><article class="card"><div class="metric-label">ต้นทุนตาม intent · 7 วัน</div>${list(d.ai.by_intent,x=>`<li class="row"><span>${esc(x.intent)} <small>· ${number(x.calls)} calls</small></span><b>${formatUsd(x.usd)}</b></li>`,'ยังไม่มีข้อมูลต้นทุน')}</article><article class="card"><div class="metric-label">เสียงจากลูกค้า</div><ul class="list"><li class="row"><span>รีวิวใหม่ 30 วัน</span><b>${number(d.support.reviews_30d)}</b></li><li class="row"><span>คะแนนเฉลี่ย</span><b>${d.support.average_rating ?? '—'}</b></li><li class="row"><span>frustration signals 24 ชม.</span><b>${number(d.support.frustration_signals_24h)}</b></li></ul></article></div></section>
        <section class="panel ${active==='quality'?'active':''}" id="quality"><div class="section-head"><div><h2>PDPA และคุณภาพข้อมูล</h2><p>รายชื่อในแท็บผู้ใช้แสดงเฉพาะ dashboard admin ที่มี key และจะซ่อนชื่อผู้ที่ยังไม่ consent</p></div></div><div class="metrics">${metric('ยังไม่ consent',number(d.data_health.unconsented))}${metric('PDPA legacy pending',number(d.data_health.pdpa_pending))}${metric('ไฟล์ไม่มี hash',number(d.data_health.docs_without_hash),'ควรตรวจ dedup')}${metric('events ที่รับ 7 วัน',number(d.data_health.events_7d))}</div><div class="notice">แดชบอร์ดนี้ตั้งใจแสดงเฉพาะข้อมูลรวม เพื่อป้องกัน PII หากต้องตรวจเคสลูกค้ารายบุคคล ให้ใช้เครื่องมือ support ที่มีการยืนยันตัวตนและบันทึก audit แยกต่างหาก</div></section>${userDetail(selectedUser)}`;
      document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{active=b.dataset.tab;render()}); document.querySelectorAll('[data-user]').forEach(b=>b.onclick=()=>openUser(d,Number(b.dataset.user))); document.querySelector('#refresh').onclick=load; document.querySelector('#apply-range').onclick=()=>{const r=dashboardRangeParams(document.querySelector('#range-start').value,document.querySelector('#range-end').value);if(!r){document.querySelector('#range-error').textContent='เลือกวันเริ่มและวันสิ้นสุดให้ถูกต้อง (สูงสุด 367 วัน)';return}rangeStart=r.start;rangeEnd=r.end;load()}; document.querySelector('#clear-range').onclick=()=>{rangeStart='';rangeEnd='';load()}; document.querySelector('#blur').onclick=()=>privacy.style.display='flex'; document.querySelector('#close-user')?.addEventListener('click',()=>{selectedUser=null;render()}); document.querySelector('#close-user-button')?.addEventListener('click',()=>{selectedUser=null;render()});
    }
    function showKeyForm(message='ต้องใช้ลิงก์ admin ที่มี dashboard key เพื่อเปิดข้อมูล') { app.innerHTML=`<div class="error"><div class="mark" style="margin:0 auto 12px">YB</div><h2>Admin Dashboard</h2><p>${message}</p><input id="key" class="key-input" placeholder="วาง dash key หรือ URL dashboard"><button class="btn primary" id="open">เปิดแดชบอร์ด</button></div>`; document.querySelector('#open').onclick=()=>{const input=document.querySelector('#key').value.trim();try{const u=new URL(input); key=decodeURIComponent(u.hash.slice(1)||u.searchParams.get('dash')||'')}catch{key=input}if(key){location.hash=encodeURIComponent(key);load()}}; }
    async function load(){ if(demoMode){data=normalizeDashboardPayload(demoDashboardPayload());render();return} if(!key){showKeyForm();return} app.classList.add('loading'); try{const params=new URLSearchParams({dash:key,json:'1'});if(rangeStart&&rangeEnd){params.set('start',rangeStart);params.set('end',rangeEnd)}const r=await fetch(`${API}?${params}`,{cache:'no-store',referrerPolicy:'no-referrer'});if(!r.ok)throw new Error(r.status===404?'ลิงก์ไม่ถูกต้อง หรือถูกหมุน key แล้ว':'เชื่อมต่อข้อมูลไม่ได้');data=normalizeDashboardPayload(await r.json());render()}catch(e){showKeyForm(esc(e.message||'โหลดข้อมูลไม่สำเร็จ'))}finally{app.classList.remove('loading')}}
    privacy.onclick=()=>privacy.style.display='none'; document.addEventListener('visibilitychange',()=>{privacy.style.display=document.hidden?'flex':'none'}); setInterval(()=>{if(!document.hidden)load()},300000); load();
  </script>
</body>
</html>
