/* 🔑 ID token ของ LIFF อายุแค่ ~1 ชม. — คนเปิดซ้ำหลังจากนั้นได้ token ตาย → API 401 ทั้งหน้า
   (เจอจริง 2026-07-04 จาก function_edge_logs) ทางแก้: เช็ค exp ก่อนใช้ + 401 → login ใหม่อัตโนมัติ 1 ครั้ง */
function tokenExpired(t){try{var b=t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");while(b.length%4)b+="=";
  var p=JSON.parse(atob(b));return !p.exp||p.exp*1000<Date.now()+60000}catch(e){return false}}
/* ⚠️ liff.login() ใช้ใน LIFF browser (ในแอป LINE) ไม่ได้ — throw ทันที (เจอจริง: หน้าโหลด 200 แต่ไม่มี POST เลย)
   ในแอปต้อง logout (ล้าง token เก่า) แล้วเปิดตัวเองใหม่ผ่าน permalink → init รอบใหม่ auto-login ได้ token สด
   guard ด้วย localStorage (sessionStorage ไม่รอดข้ามการเปิดใหม่) — ถ้าวนซ้ำใน 1 นาที = หยุด แจ้งผู้ใช้ */
function relogin(){
  try{var k=localStorage.getItem("yb_rl_t");
    if(k&&Date.now()-Number(k)<60000){$("#app").innerHTML=errBox("เข้าสู่ระบบไม่สำเร็จ ปิดหน้านี้แล้วเปิดใหม่อีกทีนะ");return}
    localStorage.setItem("yb_rl_t",String(Date.now()))}catch(e){}
  try{liff.logout()}catch(e){}
  var st="";
  try{var qp=new URLSearchParams(location.search),tb=qp.get("tab");
    if(!tb){var ls=qp.get("liff.state");if(ls){tb=new URLSearchParams(ls.charAt(0)==="?"?ls.slice(1):ls).get("tab")}}
    if(tb)st="?tab="+encodeURIComponent(tb)}catch(e){}
  if(liff.isInClient&&liff.isInClient()){location.replace("https://liff.line.me/2010582556-jAUGKlnX"+st)}
  else{try{liff.login()}catch(e){location.reload()}}
}
async function api(action,payload){
  var r=await fetch("https://eeascfxgfmzlqvirjdua.supabase.co/functions/v1/webhook?api=1",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({idToken:IDT,action:action,payload:payload||{}})});
  if(r.status===401){relogin();throw new Error("กำลังต่ออายุการเข้าสู่ระบบ รอแป๊บนึงนะ...")}
  if(!r.ok){var er="";try{er=(await r.json()).error||""}catch(e){}throw new Error(er||("ผิดพลาด "+r.status))}
  return r.json();
}

async function act(action,payload,msg){try{var res=await api(action,payload);if(res&&res.ok===false){toast("ทำรายการไม่ได้");return false}if(msg)toast(msg);await reload();return true}catch(e){toast(e.message||"ผิดพลาด");return false}}

async function boot(){
  try{
    await liff.init({liffId:"2010582556-jAUGKlnX"});
    // ในแอป LINE ห้ามเรียก liff.login() — ใช้ relogin() (permalink relaunch) แทนทุกกรณี
    if(!liff.isLoggedIn()){relogin();return}
    IDT=liff.getIDToken();
    if(!IDT){$("#app").innerHTML=errBox("ต้องเปิดสิทธิ์ openid ให้ LIFF ก่อนนะ");return}
    if(tokenExpired(IDT)){relogin();return}
    try{var qp=new URLSearchParams(location.search),tb=qp.get("tab");
      if(!tb){var ls=qp.get("liff.state");if(ls){tb=new URLSearchParams(ls.charAt(0)==="?"?ls.slice(1):ls).get("tab")}}
      if(tb==="story")tb="home"; // ปุ่มเรื่องราวของบอส (rich menu) -> เข้าหน้าหลักแดชบอร์ดรวม (บอสยืนยัน 2026-07-04); แท็บ 📖 ในแอปยังเปิดหน้าเรื่องราวได้
      if(tb&&["home","todo","money","story","heal","me","start"].indexOf(tb)>=0){TAB=tb}}catch(e){}
    DATA=await api("me.get");
    try{localStorage.removeItem("yb_rl_t")}catch(e){}
    if(TAB==="start"){
      // 🔒 ลงทะเบียนแล้ว = ไม่ต้องเจอ wizard อีก (กันลูกค้าเก่า/ลิงก์ค้าง เด้งไปหน้าหลักเลย)
      var prq=DATA&&DATA.profile;
      if(prq&&prq.display_name&&prq.pdpa_accepted_at){TAB="home"}
      else{wzRestore()} // โดนเด้ง login กลางทาง -> กลับมาต่อขั้นเดิม
    }
    draw();
  }catch(e){$("#app").innerHTML=errBox(e&&e.message?e.message:"โหลดไม่สำเร็จ")}
}

(function(){

var STOPS=[[0,[229,72,77]],[33,[240,136,62]],[66,[245,215,10]],[100,[48,209,88]]];
var GREEN=[48,209,88],EMO=[90,120,180];
function delay(fn,ms){var id=setTimeout(fn,ms);timers.push(id);return id}
function every(fn,ms){var id=setInterval(fn,ms);timers.push(id);return id}
function clearTimers(){for(var i=0;i<timers.length;i++){clearTimeout(timers[i]);clearInterval(timers[i])}timers=[]}
function $h(x){return document.getElementById(x)}
function kb(){return P}
function kbNa(){return P==="ครับ"?"นะครับ":P==="ค่ะ"?"นะคะ":"นะ"}
function lerp(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)]}
function bcol(p){var a=STOPS[0];for(var i=1;i<STOPS.length;i++){var b=STOPS[i];if(p<=b[0])return lerp(a[1],b[1],(p-a[0])/(b[0]-a[0]));a=b}return GREEN}
function rgbs(c){return"rgb("+c[0]+","+c[1]+","+c[2]+")"}
function setBatt(p){BATT=Math.max(0,Math.min(100,p));var fc=bcol(BATT);
  $h("hrfill").style.width=BATT+"%";$h("hrfill").style.background=rgbs(fc);$h("hrfill").style.boxShadow="0 0 18px "+rgbs(fc);
  $h("hrpct").textContent=Math.round(BATT)+"%";$h("hrpct").style.color=rgbs(fc);
  var sc=lerp(EMO,GREEN,BATT/100);
  $h("hrscene").style.background="radial-gradient(95% 65% at 50% 6%,rgba("+sc[0]+","+sc[1]+","+sc[2]+",.5),transparent),radial-gradient(80% 60% at 72% 100%,rgba("+sc[0]+","+sc[1]+","+sc[2]+",.25),transparent),#0b1020"}
function chargeTo(target,lbl,cb){var tk=++chargeTok;
  $h("hrblbl").innerHTML='<span class="bolt on">⚡</span> '+(lbl||"กำลังชาร์จ...");
  var start=BATT,t0=null;
  function s(ts){if(tk!==chargeTok)return;if(!t0)t0=ts;var k=Math.min(1,(ts-t0)/900);
    setBatt(start+(target-start)*k);
    if(k<1)requestAnimationFrame(s);else{$h("hrblbl").innerHTML="พลังใจ "+Math.round(target)+"% 🔋";if(cb)cb()}}
  requestAnimationFrame(s)}
function burst(list,anim,n){var ph=$h("healroom");
  for(var i=0;i<n;i++){(function(i){delay(function(){
    var e=document.createElement("div");e.className="hp";e.textContent=list[Math.floor(Math.random()*list.length)];
    e.style.left=(12+Math.random()*76)+"%";e.style.top=(anim==="hrsink"?"44%":"66%");
    e.style.setProperty("--dx",(Math.random()*120-60)+"px");e.style.setProperty("--r",(Math.random()*180-90)+"deg");
    e.style.animation=anim+" "+(1.6+Math.random()*1.2)+"s ease-out forwards";ph.appendChild(e);
    setTimeout(function(){e.remove()},3200)},i*45)})(i)}}
function render(h){clearTimers();chargeTok++;
  $h("hrstage").innerHTML='<div class="hinner hfade">'+h+'</div>';
  var bk=$h("hrbk");if(bk)bk.onclick=hrHome}
function inner(){return document.querySelector("#hrstage .hinner")}
function head(t){return '<div class="htag"><button class="hback" id="hrbk">‹</button><span>'+steptag()+' · '+t+'</span></div>'}
function addBtn(txt,ghost){var b=document.createElement("button");b.className="hbtn"+(ghost?" ghost":"");b.textContent=txt;inner().appendChild(b);return b}
function once(b,fn){b.onclick=function(){if(b.dataset.x)return;b.dataset.x=1;fn()}}
function hval(s){var e=document.querySelector(s);return e?e.value:""}
function risky(s){return /ทำร้ายตัวเอง|ไม่อยากมีชีวิต|ไม่อยากอยู่|ฆ่าตัวตาย|อยากตาย|จบชีวิต|สิ้นหวัง|อยู่ไปทำไม/.test(s||"")}
function proceed(t,lbl,txt){chargeTo(t,lbl,function(){var b=addBtn(txt||"ไปต่อ →");b.classList.add("hfade");once(b,step)})}
function chipf(t){return '<div class="hchip">'+t+'</div>'}
function note(msg){var m=document.createElement("div");m.className="hnote hfade";m.textContent=msg;inner().appendChild(m);return m}
function wireChoices(t,notes,handlers){var cs=document.querySelectorAll("#hrstage .hchip");
  cs.forEach(function(c,idx){c.onclick=function(){cs.forEach(function(x){x.onclick=null});c.classList.add("pick");
    if(handlers&&handlers[idx]){handlers[idx]();return}
    var msg=notes&&notes[idx];if(msg)note(msg);
    delay(function(){proceed(t,"รับทราบ"+kb())},msg?450:260)}})}
function steptag(){return "ก้าวที่ "+si+" / "+curSteps.length}
function starget(){return Math.round(8+si/curSteps.length*77)}
function runJourney(k){var j=JOURNEYS[k];journeyKey=k;HS={};EMO=j.color;curSteps=j.steps;si=0;setBatt(8);
  $h("hrblbl").textContent="พลังใจเหลือน้อย 🪫";step()}
function step(){if(si>=curSteps.length)return checkout();si++;curSteps[si-1](starget())}
function tomorrow9(){var d=new Date();d.setDate(d.getDate()+1);d.setHours(9,0,0,0);return d.toISOString()}
function logHeal(outcome){try{api("heal.log",{journey:journeyKey,outcome:outcome}).catch(function(){})}catch(e){}}

function setRem(t,text,okMsg){
  api("reminder.add",{text:text,remind_at:tomorrow9()})
    .then(function(){note(okMsg||("ตั้งเตือนแล้ว ✓ พรุ่งนี้ 9:00 เลขาจะทวงให้"+kb()));delay(function(){proceed(t,"อยู่ในมือเลขาแล้ว")},400)})

function stepBreathe(t){render(head("คุมลมหายใจก่อน")+
  '<h1 style="font-size:19px">ร่างกายนำใจเสมอ — คุมลมหายใจได้ ก็ดึงเกมกลับมาได้<span class="soft">1 เฮือกยาว ๆ ตามวงกลม (เข้า 4 · ค้าง 2 · ออก 6 วินาที) ปล่อยให้ไหล่ตกลงตอนหายใจออก</span></h1>'+
  '<div class="hmid"><div class="horb" id="hrorb">พร้อมเมื่อไหร่<br>แตะปุ่มเลย</div></div>');
  var extra=0;
  function breatheOnce(done){
    function phase(txt,scale,secs,next){var o=$h("hrorb");if(!o)return;
      o.style.transitionDuration=secs+"s";o.style.transform="scale("+scale+")";
      var left=secs;o.innerHTML=txt+"<br>"+left;
      var iv=every(function(){left--;var el=$h("hrorb");if(!el||left<=0){clearInterval(iv);return}el.innerHTML=txt+"<br>"+left},1000);
      delay(function(){clearInterval(iv);if(next)next()},secs*1000)}
    phase("สูดเข้า...",1.5,4,function(){phase("ค้างไว้...",1.5,2,function(){phase("ผ่อนออก... ไหล่ตก",1,6,done)})})}

  once(b,function(){b.disabled=true;chargeTo(t,"หายใจอยู่...");
    breatheOnce(function(){var o=$h("hrorb");if(o)o.innerHTML="ดีมาก"+kb()+" 🔋";b.remove();
      var n=addBtn("ไปต่อ →");n.classList.add("hfade");once(n,step);

      once(g,function(){g.disabled=true;extra++;chargeTo(Math.min(t+4*extra,90),"หายใจอยู่...");
        breatheOnce(function(){var o2=$h("hrorb");if(o2)o2.innerHTML="ดีมาก"+kb()+" 🔋";g.disabled=false;delete g.dataset.x})})})})}
